<!DOCTYPE html>
<html>
<head>
    <title>Pentest Lab V3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<canvas id="matrix"></canvas>

{% if status == "ATTACK DETECTED" %}
<div class="alert">🚨 ATTACK DETECTED 🚨</div>
{% endif %}

<div class="dashboard">

    <div class="panel">
        <h2>{{ user }}</h2>
        <h3>Status: {{ status }}</h3>

        <h3>✔ Success: {{ success }}</h3>
        <h3>❌ Failed: {{ failed }}</h3>

        <a href="/logout">Logout</a>
    </div>

    <div class="panel">
        <h2>LIVE LOGS</h2>
        <div id="logs"></div>
    </div>

</div>

<script src="/static/matrix.js"></script>
<script src="/static/live.js"></script>

</body>
</html>
